<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeX - Unblocked Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-background"></div>
    <div class="login-grid"></div>
    
    <div class="login-container">
        <div class="login-logo">
            <h1 class="main-title">CodeX</h1>
        </div>
        
        <div class="login-box">
            <h2>Enter Password</h2>
            <input type="password" id="password" placeholder="Enter access code" autocomplete="off">
            <button onclick="checkPassword()">Access Games <i class="fas fa-arrow-right"></i></button>
            <div id="error-message"></div>
        </div>
    </div>
    
    <div class="page-transition"></div>
    
    <script src="script.js"></script>
</body>
</html>
